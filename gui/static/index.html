<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aMazeTest GUI</title>
  <style>
    :root {
      --bg: #0b1020; --panel: #121a2b; --panel-2: #18233a;
      --text: #e8eefc; --muted: #9fb0d1; --line: #2b3a59;
      --green: #1fbf75; --yellow: #f2b94b; --red: #e05252;
      --blue: #5da9ff; --violet: #a97cff; --cyan: #43d1c6;
      --sidebar-w: 220px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 20px 18px 14px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.1px;
      color: var(--blue);
      border-bottom: 1px solid var(--line);
    }
    .sidebar-logo span { color: var(--violet); }
    .sidebar-section {
      padding: 14px 10px 2px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 14px;
      border-radius: 8px;
      margin: 1px 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .nav-item:hover { background: var(--panel-2); color: var(--text); }
    .nav-item.active { background: rgba(93,169,255,0.13); color: var(--blue); font-weight: 600; }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }

    /* ── Main layout ── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    #topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    #topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }
    #topbar-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    #view-area { padding: 24px; flex: 1; }

    /* ── Cards / Panels ── */
    .card {
      background: linear-gradient(180deg, var(--panel) 0%, #0f1627 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .card h3 {
      margin: 0 0 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .stat-val {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-card .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .c-green { color: var(--green); }
    .c-red { color: var(--red); }
    .c-blue { color: var(--blue); }
    .c-yellow { color: var(--yellow); }
    .c-cyan { color: var(--cyan); }
    .c-muted { color: var(--muted); }
    .c-violet { color: var(--violet); }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 10px;
      text-align: left;
      vertical-align: middle;
    }
    th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    td .actions { display: flex; gap: 6px; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-pass { background: rgba(31,191,117,0.15); color: var(--green); }
    .badge-fail  { background: rgba(224,82,82,0.30); color: #ff5f5f; border: 1px solid rgba(224,82,82,0.55); font-weight: 800; }
    .badge-xfail { background: rgba(67,209,198,0.15); color: var(--cyan); }
    .badge-xpass { background: rgba(224,82,82,0.22); color: #ff7a7a; border: 1px solid rgba(224,82,82,0.45); font-weight: 700; }
    .badge-pending { background: rgba(93,169,255,0.15); color: var(--blue); }
    .badge-running { background: rgba(159,176,209,0.12); color: var(--muted); }
    .badge-none { background: rgba(159,176,209,0.08); color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: #06101e; }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }
    .btn-success { background: var(--green); color: #03140a; }
    .btn-success:hover:not(:disabled) { opacity: 0.85; }
    .btn-danger { background: rgba(224,82,82,0.15); color: var(--red); border: 1px solid rgba(224,82,82,0.3); }
    .btn-danger:hover:not(:disabled) { background: rgba(224,82,82,0.25); }
    .btn-ghost { background: var(--panel-2); color: var(--muted); border: 1px solid var(--line); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); }
    .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

    /* ── Forms ── */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-control {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-control:focus { border-color: var(--blue); }
    textarea.form-control { resize: vertical; min-height: 80px; }
    select.form-control option { background: var(--panel-2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .radio-label:has(input:checked) { border-color: var(--blue); color: var(--blue); }
    .radio-label input { accent-color: var(--blue); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
    .tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      animation: slideIn 0.25s ease;
      max-width: 320px;
    }
    .toast-success { background: rgba(31,191,117,0.15); border: 1px solid rgba(31,191,117,0.3); color: var(--green); }
    .toast-error { background: rgba(224,82,82,0.15); border: 1px solid rgba(224,82,82,0.3); color: var(--red); }
    .toast-info { background: rgba(93,169,255,0.15); border: 1px solid rgba(93,169,255,0.3); color: var(--blue); }
    @keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── Log area ── */
    .log-area {
      background: #07101d;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #a8c0e8;
      min-height: 200px;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line-ok { color: #8ef1e6; }
    .log-line-err { color: #ffb3b3; }
    .log-line-info { color: #a8c0e8; }

    /* ── Two-column layout ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h2 { font-size: 18px; font-weight: 700; }

    /* ── Inline code ── */
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 12px;
      color: #c4d5ff;
    }

    /* ── List items ── */
    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      gap: 10px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: rgba(255,255,255,0.02); }

    /* ── Status dot ── */
    .dot {
      width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0;
    }
    .dot-green { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .dot-red { background: var(--red); }
    .dot-muted { background: var(--muted); }

    /* ── Assertion / Mock builders ── */
    .assert-row, .mock-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .assert-row select, .mock-row select { flex: 1; }
    .assert-row input, .mock-row input { flex: 1; }
    .assert-row .btn-sm, .mock-row .btn-sm { flex-shrink: 0; }

    /* ── XFAIL banner ── */
    .xfail-banner {
      background: rgba(67,209,198,0.08);
      border: 1px solid rgba(67,209,198,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--cyan);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ── Canvas chart ── */
    .chart-canvas { width: 100%; height: 180px; display: block; }

    /* ── Suite test list ── */
    .test-check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
    }
    .test-check-item:hover { background: var(--panel-2); }
    .test-check-item input[type=checkbox] { accent-color: var(--blue); width: 15px; height: 15px; }

    /* ── Suite run per-test row ── */
    .suite-test-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .suite-test-row .name { flex: 1; }
    .suite-test-row .log-toggle { cursor: pointer; color: var(--blue); font-size: 12px; text-decoration: underline; }

    /* ── Compare table ── */
    .compare-regression td { background: rgba(224,82,82,0.07); }
    .compare-fixed td { background: rgba(31,191,117,0.07); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d5070; }

    /* ── Collapsible ── */
    .collapsible-body { display: none; }
    .collapsible-body.open { display: block; }

    /* ── Policy JSON preview ── */
    .policy-preview {
      background: #07101d;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: #a8c0e8;
      white-space: pre;
      overflow: auto;
      max-height: 300px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

    /* ── MCP tool list ── */
    .tool-list { margin-top: 10px; }
    .tool-item {
      padding: 6px 10px;
      background: var(--panel-2);
      border-radius: 6px;
      margin-bottom: 5px;
      font-size: 12px;
    }
    .tool-item .tool-name { font-weight: 600; color: var(--blue); }
    .tool-item .tool-desc { color: var(--muted); margin-top: 2px; }

    @media (max-width: 900px) {
      .two-col, .three-col { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }

    /* ── Policy Editor (mock-style) ── */
    .hidden-panel { display: none !important; }
    .item-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 14px; position: relative; margin-bottom: 0; }
    .item-card .del-btn { position: absolute; top: 10px; right: 12px; cursor: pointer; color: var(--muted); font-size: 20px; line-height: 1; }
    .item-card .del-btn:hover { color: var(--red); }
    .item-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 0; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mini-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .field input, .field select, .field textarea { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 13px; outline: none; font-family: inherit; transition: border-color .15s; width: 100%; box-sizing: border-box; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--blue); }
    .field select option { background: var(--panel-2); }
    .pe-toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .mode-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--line); background: var(--panel-2); color: var(--muted); transition: all .15s; }
    .mode-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(93,169,255,.1); }
    .pe-hint { font-size: 11px; color: var(--muted); margin-left: auto; }
    #policy-canvas-wrap { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; position: relative; height: 420px; cursor: default; }
    #policy-canvas { width: 100%; height: 100%; display: block; }
    .radio-opt { display: flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line); cursor: pointer; font-size: 13px; transition: border-color .15s, background .15s; }
    .radio-opt:hover { background: rgba(255,255,255,.03); }
    .radio-opt.selected { border-color: var(--blue); background: rgba(93,169,255,.08); color: var(--blue); }
    /* Tool picker modal */
    #tool-picker-overlay { position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center; }
    #tool-picker-modal { background:var(--panel);border:1px solid var(--line);border-radius:16px;width:480px;max-height:70vh;overflow-y:auto;padding:20px; }
    /* File browser modal */
    #file-browser-overlay { position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:center;justify-content:center; }
    #file-browser-modal { background:var(--panel);border:1px solid var(--line);border-radius:16px;width:560px;max-height:72vh;display:flex;flex-direction:column;padding:0;overflow:hidden; }
    #fb-header { display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line); }
    #fb-header h3 { margin:0;font-size:14px;font-weight:700;flex:1; }
    #fb-path { font-size:11px;color:var(--muted);font-family:ui-monospace,monospace;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:4px 8px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    #fb-list { flex:1;overflow-y:auto;padding:10px; }
    .fb-entry { display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;transition:background .12s; }
    .fb-entry:hover { background:rgba(255,255,255,.05); }
    .fb-entry.fb-dir { color:var(--yellow); }
    .fb-entry.fb-file { color:var(--text); }
    .fb-entry.fb-file:hover { background:rgba(93,169,255,.1);color:var(--blue); }
    .fb-entry .fb-icon { font-size:15px;width:18px;text-align:center; }
    #fb-footer { padding:12px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px; }
    .file-path-row { display:flex;gap:8px;align-items:center; }
    .file-path-row input { flex:1; }
    .btn-browse { white-space:nowrap; }
    .tp-server { margin-bottom:14px; }
    .tp-server-name { font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px; }
    .tp-tool-btn { display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;padding:9px 12px;margin-bottom:4px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);cursor:pointer;transition:border-color .15s; }
    .tp-tool-btn:hover { border-color:var(--cyan);background:rgba(67,209,198,.06); }
    .tp-tool-btn .tname { font-size:13px;font-weight:700;color:var(--cyan);font-family:ui-monospace,monospace; }
    .tp-tool-btn .tdesc { font-size:11px;color:var(--muted); }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-logo">aMaze<span>Test</span></div>

  <div class="sidebar-section">Testing</div>
  <a class="nav-item" href="#dashboard"><span class="nav-icon">⬛</span> Dashboard</a>
  <a class="nav-item" href="#run-test"><span class="nav-icon">▶</span> Run Test</a>

  <div class="sidebar-section">Configuration</div>
  <a class="nav-item" href="#policies"><span class="nav-icon">🛡</span> Policies</a>
  <a class="nav-item" href="#policy-editor"><span class="nav-icon">✏</span> Policy Editor</a>
  <a class="nav-item" href="#test-cases"><span class="nav-icon">🧪</span> Test Cases</a>
  <a class="nav-item" href="#mcp-servers"><span class="nav-icon">🔌</span> MCP Servers</a>
  <a class="nav-item" href="#agents"><span class="nav-icon">🤖</span> Agents</a>

  <div class="sidebar-section">Suites</div>
  <a class="nav-item" href="#suites"><span class="nav-icon">📦</span> Test Suites</a>
  <a class="nav-item" href="#run-suite"><span class="nav-icon">▶▶</span> Run Suite</a>
  <a class="nav-item" href="#history"><span class="nav-icon">📈</span> History</a>
  <a class="nav-item" href="#compare"><span class="nav-icon">⇄</span> Compare Runs</a>
</nav>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <div>
      <div id="topbar-title">Dashboard</div>
      <div id="topbar-sub">aMazeTest behavioral testing framework</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="conn-status" class="badge badge-pending">connecting...</span>
    </div>
  </div>
  <div id="view-area"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
'use strict';

// ────────────────────────────────────────────────────────────
// UTILITIES
// ────────────────────────────────────────────────────────────

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function badge(outcome) {
  if (!outcome) return '<span class="badge badge-none">—</span>';
  const map = {
    pass:    ['badge-pass',    'PASS'],
    fail:    ['badge-fail',    'FAIL'],
    xfail:   ['badge-xfail',   'XFAIL ✓'],
    xpass:   ['badge-xpass',   'XPASS ✗'],
    pending: ['badge-pending', 'PENDING'],
    running: ['badge-running', 'running...'],
  };
  const [cls, label] = map[outcome.toLowerCase()] || ['badge-none', outcome];
  return `<span class="badge ${cls}">${label}</span>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = j.detail || j.message || msg; } catch {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleString(); } catch { return s; }
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e[k] = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

const ROUTES = {};
let currentView = null;

function register(hash, titleFn, renderFn) {
  ROUTES[hash] = { titleFn, renderFn };
}

function navigate(hash) {
  if (!hash || hash === '#') hash = '#dashboard';
  // Update nav
  document.querySelectorAll('.nav-item').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === hash);
  });
  const route = ROUTES[hash] || ROUTES['#dashboard'];
  const title = route.titleFn();
  document.getElementById('topbar-title').textContent = title[0];
  document.getElementById('topbar-sub').textContent = title[1] || 'aMazeTest behavioral testing framework';
  const area = document.getElementById('view-area');
  area.innerHTML = '';
  currentView = hash;
  route.renderFn(area);
}

window.addEventListener('hashchange', () => navigate(location.hash));
window.addEventListener('load', () => {
  checkServer();
  navigate(location.hash || '#dashboard');
});

async function checkServer() {
  const el = document.getElementById('conn-status');
  try {
    await api('/agents');
    el.className = 'badge badge-pass';
    el.textContent = 'connected';
  } catch {
    el.className = 'badge badge-fail';
    el.textContent = 'offline';
  }
}

function makeTabs(container, tabs) {
  const tabBar = el('div', { class: 'tabs' });
  const panels = {};
  tabs.forEach(({ id, label, content }, i) => {
    const t = el('div', { class: 'tab' + (i === 0 ? ' active' : ''), onclick() {
      tabBar.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      Object.values(panels).forEach(p => p.classList.remove('active'));
      panels[id].classList.add('active');
    }}, label);
    tabBar.appendChild(t);
    const p = el('div', { class: 'tab-panel' + (i === 0 ? ' active' : '') });
    if (typeof content === 'string') p.innerHTML = content;
    else if (content instanceof Node) p.appendChild(content);
    else if (typeof content === 'function') content(p);
    panels[id] = p;
  });
  container.appendChild(tabBar);
  Object.values(panels).forEach(p => container.appendChild(p));
  return panels;
}

register('#run-test',

          </div>

          </div>

        </div>
      </div>

    const runBtn = document.getElementById('rt-run-btn');
    const detailsCard = document.getElementById('rt-details');
    const detailsBody = document.getElementById('rt-details-body');
    const logArea = document.getElementById('rt-log');
    const outcomeBadge = document.getElementById('rt-outcome-badge');
    let activeES = null;

    sel.addEventListener('change', async () => {
      const name = sel.value;
      runBtn.disabled = !name;
      if (!name) { detailsCard.style.display = 'none'; return; }
      try {
        const tc = await api(`/test-cases/${encodeURIComponent(name)}`);
        detailsCard.style.display = '';
        detailsBody.innerHTML = `
          <div style="display:grid;grid-template-columns:110px 1fr;gap:8px;font-size:13px">
            <span style="color:var(--muted)">Policy</span><span><code>${esc(tc.policy_name || '—')}</code></span>
            <span style="color:var(--muted)">Agent</span><span><code>${esc(tc.agent_name || '—')}</code></span>
            <span style="color:var(--muted)">Expected</span><span>${badge(!tc.expected_pass ? 'xfail' : 'pass')}</span>
            <span style="color:var(--muted)">Description</span><span>${esc(tc.description || '—')}</span>
            <span style="color:var(--muted)">Prompt</span><span style="white-space:pre-wrap;color:var(--muted)">${esc(tc.prompt || '—')}</span>
          </div>
        `;
      } catch (e) {
        toast('Failed to load test case: ' + e.message, 'error');
      }
    });

    runBtn.addEventListener('click', async () => {
      const name = sel.value;
      if (!name) return;
      if (activeES) { activeES.close(); activeES = null; }
      logArea.textContent = '';
      outcomeBadge.innerHTML = badge('running');
      runBtn.disabled = true;

      try {
        const { run_id } = await api('/runs/test', { method: 'POST', body: { test_case_name: name } });
        appendLog(logArea, `Run started: ${run_id}\n`, 'info');

        activeES = new EventSource(`/api/runs/test/${encodeURIComponent(run_id)}/stream`);
        activeES.onmessage = async (evt) => {
          try {
            const data = JSON.parse(evt.data);
            if (data.done) {
              activeES.close(); activeES = null;
              runBtn.disabled = false;
              // Replace entire area with HTML report
              try {
                const runData = await api(`/runs/test/${run_id}`);
                if (runData.audit_html_path) {
                  const fname = runData.audit_html_path.split('/').pop();
                  area.innerHTML = `
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
                      <h2 style="font-size:18px;font-weight:700">${esc(name)}</h2>
                      ${badge(data.outcome)}
                      <button class="btn btn-ghost btn-sm" onclick="navigate('#run-test')" style="margin-left:auto">← New Run</button>
                    </div>
                    <iframe src="/audit/${esc(fname)}" style="width:100%;height:calc(100vh - 130px);border:none;border-radius:12px;background:#fff;"></iframe>
                  `;
                  return;
                }
              } catch {}
              // Fallback: just show outcome badge
              outcomeBadge.innerHTML = badge(data.outcome);
              appendLog(logArea, `\n--- Done: ${data.outcome.toUpperCase()} ---`, data.outcome === 'pass' || data.outcome === 'xfail' ? 'ok' : 'err');
            } else if (data.line !== undefined) {
              appendLog(logArea, data.line, 'info');
            }
          } catch {}
        };
        activeES.onerror = () => {
          appendLog(logArea, '\n[Stream error or closed]', 'err');
          activeES.close(); activeES = null;
          runBtn.disabled = false;
        };
      } catch (e) {
        toast('Failed to start run: ' + e.message, 'error');
        outcomeBadge.innerHTML = badge('fail');
        runBtn.disabled = false;
      }
    });
  }
);

function appendLog(el, text, cls = 'info') {
  const span = document.createElement('span');
  span.className = cls === 'ok' ? 'log-line-ok' : cls === 'err' ? 'log-line-err' : 'log-line-info';
  span.textContent = text + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

// ────────────────────────────────────────────────────────────
// POLICY EDITOR  (SVG graph canvas + rich mocks/assertions)
// ────────────────────────────────────────────────────────────

const PE = {
  nodes: [], edges: [],
  mode: 'drag',     // drag | connect | delete
  selected: null,
  nextId: 1,
};
const NODE_COLORS = { agent:'#5da9ff', llm:'#a97cff', finish:'#1fbf75', default:'#43d1c6' };
const NODE_W = 110, NODE_H = 40;

window.peInit = function() {
  const svg = document.getElementById('policy-canvas');
  if (!svg) return;
  svg.innerHTML = `<defs>
    <marker id="pe-arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9fb0d1"/>
    </marker>
  </defs>`;
  if (PE.nodes.length === 0) {
    PE.nodes = [{id:'n1',label:'agent',x:60,y:180,type:'agent'}];
    PE.edges = []; PE.nextId = 2;
  }
  peRender();
};

window.peRender = function() {
  const svg = document.getElementById('policy-canvas');
  if (!svg) return;
  const defs = svg.querySelector('defs')?.outerHTML || '';
  svg.innerHTML = defs;

  PE.edges.forEach((e, i) => {
    const a = PE.nodes.find(n=>n.id===e.from);
    const b = PE.nodes.find(n=>n.id===e.to);
    if (!a || !b) return;
    const x1=a.x+NODE_W, y1=a.y+NODE_H/2, x2=b.x, y2=b.y+NODE_H/2, mx=(x1+x2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill','none'); path.setAttribute('stroke','#9fb0d1');
    path.setAttribute('stroke-width','2'); path.setAttribute('marker-end','url(#pe-arrow)');
    if (PE.mode==='delete') { path.style.cursor='pointer'; path.addEventListener('click',()=>{ PE.edges.splice(i,1); peRender(); }); }
    svg.appendChild(path);
  });

  PE.nodes.forEach(n => {
    const color = n.type==='tool' ? NODE_COLORS.default : (NODE_COLORS[n.type]||NODE_COLORS.default);
    const isSel = PE.selected===n.id;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${n.x},${n.y})`);
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('width',NODE_W); rect.setAttribute('height',NODE_H); rect.setAttribute('rx','10');
    rect.setAttribute('fill', isSel ? color : 'rgba(0,0,0,0)');
    rect.setAttribute('stroke', color); rect.setAttribute('stroke-width', isSel?'2.5':'2');
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',NODE_W/2); text.setAttribute('y',NODE_H/2+5);
    text.setAttribute('text-anchor','middle'); text.setAttribute('fill', isSel?'#fff':color);
    text.setAttribute('font-size','12'); text.setAttribute('font-weight','700');
    text.setAttribute('font-family','Inter,sans-serif'); text.textContent = n.label;
    g.appendChild(rect); g.appendChild(text); g.dataset.nodeId = n.id;
    svg.appendChild(g);
  });
  peSvgEvents();
  peSyncJson();
};

function peSvgEvents() {
  const svg = document.getElementById('policy-canvas');
  if (!svg) return;
  let drag = null;
  svg.querySelectorAll('g[data-node-id]').forEach(g => {
    const id = g.dataset.nodeId;
    if (PE.mode==='drag') {
      g.style.cursor='grab';
      g.addEventListener('mousedown', e => {
        e.preventDefault();
        const pt=svgPt(svg,e); const n=PE.nodes.find(n=>n.id===id);
        drag={id,ox:pt.x-n.x,oy:pt.y-n.y}; PE.selected=id; peRender();
      });
    } else if (PE.mode==='connect') {
      g.style.cursor='crosshair';
      g.addEventListener('click', e => {
        e.stopPropagation();
        if (!PE.selected) {
          PE.selected=id; peRender();
          const h=document.getElementById('pe-hint'); if(h) h.textContent='Now click the destination node';
        } else if (PE.selected!==id) {
          PE.edges.push({from:PE.selected,to:id}); PE.selected=null;
          const h=document.getElementById('pe-hint'); if(h) h.textContent='Edge added! Click source again';
          peRender();
        }
      });
    } else if (PE.mode==='delete') {
      g.style.cursor='pointer';
      g.addEventListener('click', e => {
        e.stopPropagation();
        PE.nodes=PE.nodes.filter(n=>n.id!==id); PE.edges=PE.edges.filter(e=>e.from!==id&&e.to!==id);
        peRender();
      });
    }
  });
  if (PE.mode==='drag') {
    svg.addEventListener('mousemove', e => {
      if (!drag) return;
      const pt=svgPt(svg,e); const n=PE.nodes.find(n=>n.id===drag.id);
      if (n) { n.x=pt.x-drag.ox; n.y=pt.y-drag.oy; peRender(); }
    });
    svg.addEventListener('mouseup', ()=>{ drag=null; });
    svg.addEventListener('mouseleave', ()=>{ drag=null; });
  }
}

function svgPt(svg,e) { const r=svg.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }

function peSyncJson() {
  const el = document.getElementById('pe-json-preview');
  if (!el) return;
  const nodes = PE.nodes.map(n=>n.label);
  const edges = PE.edges.map(e=>[PE.nodes.find(n=>n.id===e.from)?.label, PE.nodes.find(n=>n.id===e.to)?.label].filter(Boolean));
  const ignEl = document.getElementById('pe-ignore-llm');
  const ignore_internal_llm = ignEl ? ignEl.dataset.val!=='false' : true;
  const obj = {mode:'graph',nodes,edges,ignore_internal_llm};

  // Include mocks
  const mockCards=[...document.querySelectorAll('#pe-mocks-list .item-card')];
  if(mockCards.length){
    obj.mocks=[];
    mockCards.forEach(c=>{
      const inputs=[...c.querySelectorAll('input')];
      const target=inputs[0]?.value.trim(); if(!target) return;
      const matchContains=inputs[1]?.value.trim();
      const type=c.querySelector('select')?.value;
      const m={target}; if(matchContains) m.match_contains=matchContains;
      if(type==='tool_call'){
        const tn=c.querySelector('.mock-tool-name')?.value.trim();
        let args={}; try{args=JSON.parse(c.querySelector('.mock-tool-args')?.value||'{}')}catch{}
        m.return_tool_call={tool:tn,args};
      } else if(type==='ai_message'){
        m.ai_message=c.querySelector('.mock-ai-val')?.value||'';
      } else {
        m.output=c.querySelector('.mock-out-val')?.value||'';
      }
      obj.mocks.push(m);
    });
  }

  // Include assertions
  const assertCards=[...document.querySelectorAll('#pe-assertions-list .item-card')];
  if(assertCards.length){
    obj.assertions=[];
    assertCards.forEach(c=>{
      const target=c.querySelector('.as-target')?.value.trim(); if(!target) return;
      obj.assertions.push({
        target,
        check:c.querySelector('.as-check')?.value||'input',
        operator:c.querySelector('.as-op')?.value||'contains',
        expected:c.querySelector('.as-expected')?.value||'',
        description:c.querySelector('.as-desc')?.value||'',
      });
    });
  }

  el.textContent = JSON.stringify(obj,null,2);
}
window.peSyncJson = peSyncJson;

window.setPeMode = function(mode) {
  PE.mode=mode; PE.selected=null;
  ['drag','connect','delete'].forEach(m=>{ const b=document.getElementById('mode-'+m); if(b) b.classList.toggle('active',m===mode); });
  const hints={drag:'Click a node to select; drag to move',connect:'Click source node, then destination',delete:'Click a node or edge to delete it'};
  const h=document.getElementById('pe-hint'); if(h) h.textContent=hints[mode];
  peRender();
};

window.peAddNode = function(type) {
  PE.nodes.push({id:'n'+PE.nextId++,label:type,x:150+(PE.nextId*20%280),y:80+(PE.nextId*15%280),type});
  peRender();
};

window.peAddNodeTool = async function() {
  let servers=[];
  try { servers=await api('/mcp-servers'); } catch {}
  let serverHtml='';
  for (const s of servers) {
    let tools=[]; try { tools=JSON.parse(s.tools_json||'[]'); } catch {}
    if (!tools.length) continue;
    serverHtml+=`<div class="tp-server"><div class="tp-server-name">${esc(s.name)}</div>`;
    for (const t of tools) {
      serverHtml+=`<button class="tp-tool-btn" onclick="pePickTool('${esc(t.name||t)}')"><span class="tname">tool:${esc(t.name||t)}</span><span class="tdesc">${esc(t.description||'')}</span></button>`;
    }
    serverHtml+='</div>';
  }
  if (!serverHtml) serverHtml='<div style="color:var(--muted);font-size:13px;margin-bottom:12px">No MCP servers with fetched tools. Use manual entry below.</div>';
  const overlay=document.createElement('div'); overlay.id='tool-picker-overlay';
  overlay.innerHTML=`<div id="tool-picker-modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="margin:0;font-size:14px;font-weight:700">Select Tool from MCP Servers</h3>
      <span style="cursor:pointer;font-size:22px;color:var(--muted);line-height:1" onclick="document.getElementById('tool-picker-overlay').remove()">×</span>
    </div>
    ${serverHtml}
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0"/>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:12px;color:var(--muted)">or enter manually:</span>
      <input id="tp-manual" placeholder="tool_name" style="flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;color:var(--text);padding:6px 10px;font-size:12px;outline:none"/>
      <button class="btn btn-ghost btn-sm" onclick="pePickToolManual()">Add</button>
    </div>
  </div>`;
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
};

window.pePickTool = function(name) {
  const ov=document.getElementById('tool-picker-overlay'); if(ov) ov.remove();
  PE.nodes.push({id:'n'+PE.nextId++,label:'tool:'+name,x:250+(PE.nextId*15%220),y:150+(PE.nextId*20%220),type:'tool'});
  peRender();
};

window.pePickToolManual = function() {
  const inp=document.getElementById('tp-manual');
  if(inp&&inp.value.trim()) pePickTool(inp.value.trim());
};

window.switchPolicyTab = function(tab) {
  document.querySelectorAll('[data-ptab]').forEach(t=>t.classList.toggle('active',t.dataset.ptab===tab));
  document.getElementById('ptab-graph').classList.toggle('hidden-panel', tab!=='graph');
  document.getElementById('ptab-control').classList.toggle('hidden-panel', tab!=='control');
  if (tab==='graph') setTimeout(()=>peRender(), 10);
};

      <div class="field"><label>Tool Args (JSON)</label><input class="mock-tool-args" placeholder='{"query":"..."}' value="${esc(toolArgs)}" oninput="peSyncJson()"/></div>
    </div>

      <label>AI Message Text</label><input class="mock-ai-val" placeholder="The answer is..." value="${esc(aiMsg)}" oninput="peSyncJson()"/>

window.addPerToolLimit = function(tool='', maxCalls='') {

window.peImportJson = function(imported) {
  const isGraph = imported.mode==='graph' || (!imported.mode && Array.isArray(imported.nodes));

  // Switch tab
  switchPolicyTab(isGraph ? 'graph' : 'control');

  if (isGraph) {
    // Rebuild PE nodes/edges from imported JSON
    PE.nodes=[]; PE.edges=[]; PE.selected=null; PE.nextId=1;
    const pos=[{x:60,y:180},{x:220,y:180},{x:380,y:100},{x:380,y:260},{x:540,y:180},{x:700,y:180},{x:700,y:100}];
    (imported.nodes||[]).forEach((label,i)=>{
      const type=label==='agent'?'agent':label==='llm'?'llm':label==='finish'?'finish':'tool';
      const p=pos[i]||{x:60+i*160, y:80+(i%3)*160};
      PE.nodes.push({id:'n'+PE.nextId++,label,x:p.x,y:p.y,type});
    });
    (imported.edges||[]).forEach(([from,to])=>{
      const a=PE.nodes.find(n=>n.label===from), b=PE.nodes.find(n=>n.label===to);
      if(a&&b) PE.edges.push({from:a.id,to:b.id});
    });

    // ignore_internal_llm toggle
    const ignEl=document.getElementById('pe-ignore-llm');
    if(ignEl){
      const val = imported.ignore_internal_llm!==false;
      ignEl.dataset.val = String(val);
      ignEl.querySelectorAll('.radio-opt').forEach((r,i)=>{
        r.classList.toggle('selected', i===0 ? val : !val);
      });
    }

    setTimeout(()=>{ window.peInit(); }, 30);
  } else {
    // Control plane fields
    const at=document.getElementById('pe-allowed-tools');
    if(at) at.value=(imported.allowed_tools||[]).join(', ');
    const ml=document.getElementById('pe-max-llm');
    if(ml) ml.value=imported.max_llm_calls!=null?imported.max_llm_calls:'';
    const mt=document.getElementById('pe-max-tool');
    if(mt) mt.value=imported.max_tool_calls!=null?imported.max_tool_calls:'';
    const mtok=document.getElementById('pe-max-tokens');
    if(mtok) mtok.value=imported.max_tokens!=null?imported.max_tokens:'';

    // Per-tool limits
    const ptlList=document.getElementById('pe-per-tool-limits');
    if(ptlList){ ptlList.innerHTML=''; }
    if(imported.max_tool_calls_per_tool){
      Object.entries(imported.max_tool_calls_per_tool).forEach(([t,m])=>addPerToolLimit(t,m));
    }
  }

  // Mocks
  const mockList=document.getElementById('pe-mocks-list');
  if(mockList){ mockList.innerHTML=''; }
  (Array.isArray(imported.mocks)?imported.mocks:[]).forEach(m=>addMock(m));

  // Assertions
  const assertList=document.getElementById('pe-assertions-list');
  if(assertList){ assertList.innerHTML=''; }
  (Array.isArray(imported.assertions)?imported.assertions:[]).forEach(a=>addAssertion(a));
  peSyncJson();
};

    const isGraph = pj.mode==='graph' || (!pj.mode && Array.isArray(pj.nodes));

    PE.nodes=[]; PE.edges=[]; PE.mode='drag'; PE.selected=null; PE.nextId=1;

      const pos=[{x:60,y:180},{x:220,y:180},{x:380,y:100},{x:380,y:260},{x:540,y:180},{x:700,y:180},{x:700,y:100}];
      pj.nodes.forEach((label,i)=>{
        const type=label==='agent'?'agent':label==='llm'?'llm':label==='finish'?'finish':'tool';
        const p=pos[i]||{x:60+i*160, y:80+(i%3)*160};
        PE.nodes.push({id:'n'+PE.nextId++,label,x:p.x,y:p.y,type});
      });
      (pj.edges||[]).forEach(([from,to])=>{
        const a=PE.nodes.find(n=>n.label===from), b=PE.nodes.find(n=>n.label===to);

        <h2 style="font-size:18px;font-weight:700">${editName?'Edit Policy: '+esc(editName):'New Policy'}</h2>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost" onclick="location.hash='#policies'">Cancel</button>
          <button class="btn btn-ghost" onclick="document.getElementById('pe-file-input').click()">📂 Import JSON</button>
          <input type="file" id="pe-file-input" accept=".json" style="display:none"/>
          <button class="btn btn-primary" id="pe-save-btn">💾 Save Policy</button>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="field"><label>Policy Name *</label>
            <input class="form-control" id="pe-name" value="${esc(existing?.name||'')}" placeholder="my-policy" ${editName?'readonly':''}/>
          </div>
          <div class="field"><label>Description</label>
            <input class="form-control" id="pe-desc" value="${esc(existing?.description||'')}" placeholder="Optional description"/>
          </div>
        </div>
      </div>

      <div class="tabs" style="margin-bottom:20px">
        <div class="tab ${isGraph?'active':''}" data-ptab="graph" onclick="switchPolicyTab('graph')">Graph Mode</div>
        <div class="tab ${!isGraph?'active':''}" data-ptab="control" onclick="switchPolicyTab('control')">Control Plane Mode</div>
      </div>

      <!-- GRAPH MODE -->
      <div id="ptab-graph" ${!isGraph?'class="hidden-panel"':''}>

          <button class="btn btn-ghost btn-sm" onclick="peAddNode('agent')">+ Agent</button>
          <button class="btn btn-ghost btn-sm" onclick="peAddNode('llm')">+ LLM</button>
          <button class="btn btn-ghost btn-sm" onclick="peAddNodeTool()">+ Tool</button>
          <button class="btn btn-ghost btn-sm" onclick="peAddNode('finish')">+ Finish</button>
          <div style="width:1px;height:20px;background:var(--line);margin:0 4px"></div>
          <div class="mode-btn active" id="mode-drag" onclick="setPeMode('drag')">✥ Drag</div>
          <div class="mode-btn" id="mode-connect" onclick="setPeMode('connect')">⟶ Connect</div>
          <div class="mode-btn" id="mode-delete" onclick="setPeMode('delete')">✕ Delete</div>
          <div class="pe-hint" id="pe-hint">Click a node to select; drag to move</div>
        </div>
        <div id="policy-canvas-wrap"><svg id="policy-canvas"></svg></div>
        <div style="margin-top:10px;font-size:12px;color:var(--muted)">
          <strong style="color:var(--text)">Generated policy JSON:</strong>
          <pre id="pe-json-preview" style="margin-top:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:12px;font-size:11px;color:#b0c8ff;overflow-x:auto;max-height:120px"></pre>

        <div class="field" style="margin-top:14px">
          <label>ignore_internal_llm</label>
          <div style="display:flex;gap:10px;flex-wrap:wrap" id="pe-ignore-llm" data-val="${ignIllm}">
            <div class="radio-opt ${ignIllm?'selected':''}" onclick="this.parentElement.dataset.val='true';this.parentElement.querySelectorAll('.radio-opt').forEach(r=>r.classList.remove('selected'));this.classList.add('selected');peSyncJson()">true (recommended)</div>
            <div class="radio-opt ${!ignIllm?'selected':''}" onclick="this.parentElement.dataset.val='false';this.parentElement.querySelectorAll('.radio-opt').forEach(r=>r.classList.remove('selected'));this.classList.add('selected');peSyncJson()">false</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px">

          <div class="item-list" id="pe-per-tool-limits" style="margin-bottom:8px"></div>

      <!-- MOCKS -->
      <hr style="border:none;border-top:1px solid var(--line);margin:20px 0"/>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.09em">Mocks</span>
        <button class="btn btn-ghost btn-sm" onclick="addMock()">+ Add Mock</button>
      </div>
      <div class="item-list" id="pe-mocks-list" style="margin-bottom:4px"></div>

      <!-- ASSERTIONS -->
      <hr style="border:none;border-top:1px solid var(--line);margin:20px 0"/>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.09em">Assertions</span>
        <button class="btn btn-ghost btn-sm" onclick="addAssertion()">+ Add Assertion</button>

      <div class="item-list" id="pe-assertions-list" style="margin-bottom:20px"></div>

    // Populate per-tool limits
    if (pj.max_tool_calls_per_tool) {
      Object.entries(pj.max_tool_calls_per_tool).forEach(([t,m])=>addPerToolLimit(t,m));
    }
    // Populate mocks
    (Array.isArray(pj.mocks)?pj.mocks:[]).forEach(m=>addMock(m));
    // Populate assertions
    (Array.isArray(pj.assertions)?pj.assertions:[]).forEach(a=>addAssertion(a));
    peSyncJson();

    // Init SVG canvas
    setTimeout(()=>{ if(isGraph) window.peInit(); }, 60);

    // Import JSON file
    document.getElementById('pe-file-input').addEventListener('change', function() {
      const file = this.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          peImportJson(imported);
          toast('Policy imported from file', 'success');
        } catch {
          toast('Invalid JSON file', 'error');
        }
        this.value = ''; // allow re-importing same file
      };
      reader.readAsText(file);
    });

    // Save
    document.getElementById('pe-save-btn').addEventListener('click', async () => {
      const name = document.getElementById('pe-name').value.trim();
      if (!name) { toast('Policy name is required','error'); return; }
      const desc = document.getElementById('pe-desc').value.trim();
      const activeTab = document.querySelector('[data-ptab].active');
      const mode = activeTab?.dataset.ptab==='control' ? 'control_plane' : 'graph';
      const obj = {mode};

      if (mode==='graph') {
        obj.nodes=PE.nodes.map(n=>n.label);
        if (!obj.nodes.includes('finish')) { toast('Please add a "finish" node to the graph','error'); return; }
        obj.edges=PE.edges.map(e=>[PE.nodes.find(n=>n.id===e.from)?.label,PE.nodes.find(n=>n.id===e.to)?.label].filter(Boolean));
        const ignEl=document.getElementById('pe-ignore-llm');
        obj.ignore_internal_llm=ignEl?ignEl.dataset.val!=='false':true;
      } else {
        const at=document.getElementById('pe-allowed-tools').value;
        if(at.trim()) obj.allowed_tools=at.split(',').map(s=>s.trim()).filter(Boolean);
        const ml=document.getElementById('pe-max-llm').value; if(ml) obj.max_llm_calls=parseInt(ml);
        const mt=document.getElementById('pe-max-tool').value; if(mt) obj.max_tool_calls=parseInt(mt);
        const mtok=document.getElementById('pe-max-tokens').value; if(mtok) obj.max_tokens=parseInt(mtok);
        const ptlCards=[...document.querySelectorAll('#pe-per-tool-limits .item-card')];
        if(ptlCards.length){
          obj.max_tool_calls_per_tool={};
          ptlCards.forEach(c=>{ const t=c.querySelector('.ptl-tool')?.value.trim(); const m=c.querySelector('.ptl-max')?.value; if(t&&m) obj.max_tool_calls_per_tool[t]=parseInt(m); });
        }
      }

      // Mocks
      const mockCards=[...document.querySelectorAll('#pe-mocks-list .item-card')];
      if(mockCards.length){
        obj.mocks=[];
        mockCards.forEach(c=>{
          const inputs=[...c.querySelectorAll('input')];
          const target=inputs[0]?.value.trim(); if(!target) return;
          const matchContains=inputs[1]?.value.trim();
          const type=c.querySelector('select')?.value;
          const m={target}; if(matchContains) m.match_contains=matchContains;
          if(type==='tool_call'){
            const tn=c.querySelector('.mock-tool-name')?.value.trim();
            let args={}; try{args=JSON.parse(c.querySelector('.mock-tool-args')?.value||'{}')}catch{}
            m.return_tool_call={tool:tn,args};
          } else if(type==='ai_message'){
            m.ai_message=c.querySelector('.mock-ai-val')?.value||'';
          } else {
            m.output=c.querySelector('.mock-out-val')?.value||'';
          }
          obj.mocks.push(m);
        });
      }

      // Assertions
      const assertCards=[...document.querySelectorAll('#pe-assertions-list .item-card')];
      if(assertCards.length){
        obj.assertions=[];
        assertCards.forEach(c=>{
          const target=c.querySelector('.as-target')?.value.trim(); if(!target) return;
          obj.assertions.push({
            target,
            check:c.querySelector('.as-check')?.value||'input',
            operator:c.querySelector('.as-op')?.value||'contains',
            expected:c.querySelector('.as-expected')?.value||'',
            description:c.querySelector('.as-desc')?.value||'',
          });
        });
      }

      try {
        const payload={name,description:desc,policy_json:JSON.stringify(obj)};
        if(editName){ await api(`/policies/${encodeURIComponent(editName)}`,{method:'PUT',body:payload}); toast('Policy updated','success'); }
        else { await api('/policies',{method:'POST',body:payload}); toast('Policy created','success'); }
        location.hash='#policies';
      } catch(e){ toast('Error: '+e.message,'error'); }
    });
  }
);

register('#test-cases',
  () => ['Test Cases', 'Manage test cases'],
  async (area) => {
    area.innerHTML = '<div class="empty-state"><div class="icon">⏳</div>Loading...</div>';
    try {
      const testCases = await api('/test-cases');
      area.innerHTML = '';
      const header = el('div', { class: 'section-header' });
      header.innerHTML = '<h2>Test Cases</h2>';
      const addBtn = el('button', { class: 'btn btn-primary', onclick() { location.hash = '#test-case-editor'; } }, '+ New Test Case');
      header.appendChild(addBtn);
      area.appendChild(header);

      const card = el('div', { class: 'card' });
      if (testCases.length === 0) {
        card.innerHTML = '<div class="empty-state"><div class="icon">🧪</div>No test cases yet.</div>';
      } else {
        const tbl = el('table');
        tbl.innerHTML = `<thead><tr>
          <th>Name</th><th>Policy</th><th>Agent</th><th>Expected</th><th>Actions</th>
        </tr></thead>`;
        const tbody = el('tbody');
        for (const tc of testCases) {
          const tr = el('tr');
          const expOutcome = !tc.expected_pass ? 'xfail' : 'pass';
          tr.innerHTML = `
            <td><strong>${esc(tc.name)}</strong>${tc.description ? `<br><small style="color:var(--muted)">${esc(tc.description)}</small>` : ''}</td>
            <td><code>${esc(tc.policy_name || '—')}</code></td>
            <td><code>${esc(tc.agent_name || '—')}</code></td>
            <td>${badge(expOutcome)}</td>
            <td><div class="actions">
              <button class="btn btn-ghost btn-sm" onclick="editTestCase('${esc(tc.name)}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteTestCase('${esc(tc.name)}')">Delete</button>
              <button class="btn btn-success btn-sm" onclick="runTestCase('${esc(tc.name)}')">▶ Run</button>
            </div></td>
          `;
          tbody.appendChild(tr);
        }
        tbl.appendChild(tbody);
        card.appendChild(tbl);
      }
      area.appendChild(card);
    } catch (e) {
      area.innerHTML = `<div class="empty-state"><div class="icon">⚠</div>${esc(e.message)}</div>`;
    }
  }
);

window.editTestCase = function(name) {
  sessionStorage.setItem('edit-test-case', name);
  location.hash = '#test-case-editor';
};

window.deleteTestCase = async function(name) {
  if (!confirm(`Delete test case "${name}"?`)) return;
  try {
    await api(`/test-cases/${encodeURIComponent(name)}`, { method: 'DELETE' });
    toast('Test case deleted', 'success');
    navigate('#test-cases');
  } catch (e) { toast('Error: ' + e.message, 'error'); }
};

window.runTestCase = function(name) {
  sessionStorage.setItem('run-test-case', name);
  location.hash = '#run-test';
  setTimeout(() => {
    const sel = document.getElementById('rt-select');
    if (sel) { sel.value = name; sel.dispatchEvent(new Event('change')); }
  }, 300);
};

// TEST CASE EDITOR
// ────────────────────────────────────────────────────────────

register('#test-case-editor',
  () => ['Test Case Editor', 'Create or edit a test case'],
  async (area) => {
    const editName = sessionStorage.getItem('edit-test-case');
    sessionStorage.removeItem('edit-test-case');

    let existing = null;
    let [policies, agents] = [[], []];
    try {
      [policies, agents] = await Promise.all([api('/policies'), api('/agents')]);
    } catch {}
    if (editName) {
      try { existing = await api(`/test-cases/${encodeURIComponent(editName)}`); } catch {}
    }

    area.innerHTML = `
      <div class="section-header">
        <h2>${editName ? 'Edit Test Case: ' + esc(editName) : 'New Test Case'}</h2>
        <a href="#test-cases" class="btn btn-ghost">← Back</a>
      </div>
      <div style="max-width:680px">
        <div class="card">
          <div class="form-group">
            <label>Test Case Name *</label>
            <input class="form-control" id="tce-name" value="${esc(existing?.name || '')}" placeholder="my-test" ${editName ? 'readonly' : ''} />
          </div>
          <div class="form-group">
            <label>Description</label>
            <input class="form-control" id="tce-desc" value="${esc(existing?.description || '')}" placeholder="What does this test verify?" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Policy</label>
              <select class="form-control" id="tce-policy">
                <option value="">— none —</option>
                ${policies.map(p => `<option value="${esc(p.name)}" ${existing?.policy_name===p.name?'selected':''}>${esc(p.name)}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>Agent</label>
              <select class="form-control" id="tce-agent">
                <option value="">— none —</option>
                ${agents.map(a => `<option value="${esc(a.name)}" ${existing?.agent_name===a.name?'selected':''}>${esc(a.name)}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Prompt</label>
            <textarea class="form-control" id="tce-prompt" rows="4" placeholder="The user prompt to send to the agent">${esc(existing?.prompt || '')}</textarea>
          </div>
          <div class="form-group">
            <label>Expected Outcome</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="tce-outcome" value="positive" ${!existing || existing.expected_pass !== 0 ? 'checked' : ''}> Positive (PASS)</label>
              <label class="radio-label"><input type="radio" name="tce-outcome" value="negative" ${existing?.expected_pass === 0 ? 'checked' : ''}> Negative (XFAIL)</label>
            </div>
            <div class="xfail-banner" id="tce-xfail-banner">
              This test is expected to fail. The outcome will be reported as XFAIL if the agent fails as expected, or XPASS if it unexpectedly passes.
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:6px">
            <button class="btn btn-primary" id="tce-save">💾 Save</button>
            <button class="btn btn-ghost" onclick="location.hash='#test-cases'">Cancel</button>
          </div>
        </div>
      </div>
    `;

    const xfailBanner = document.getElementById('tce-xfail-banner');
    document.querySelectorAll('input[name="tce-outcome"]').forEach(r => {
      r.addEventListener('change', () => {
        xfailBanner.style.display = r.value === 'negative' && r.checked ? 'block' : 'none';
      });
    });
    // Show banner if negative already selected
    if (existing?.expected_pass === 0) xfailBanner.style.display = 'block';

    document.getElementById('tce-save').addEventListener('click', async () => {
      const name = document.getElementById('tce-name').value.trim();
      if (!name) { toast('Name is required', 'error'); return; }
      const payload = {
        name,
        description: document.getElementById('tce-desc').value.trim(),
        policy_name: document.getElementById('tce-policy').value || null,
        agent_name: document.getElementById('tce-agent').value || null,
        prompt: document.getElementById('tce-prompt').value.trim(),
        expected_pass: document.querySelector('input[name="tce-outcome"]:checked')?.value !== 'negative',
      };
      try {
        if (editName) {
          await api(`/test-cases/${encodeURIComponent(editName)}`, { method: 'PUT', body: payload });
          toast('Test case updated', 'success');
        } else {
          await api('/test-cases', { method: 'POST', body: payload });
          toast('Test case created', 'success');
        }
        location.hash = '#test-cases';
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    });
  }
);

register('#mcp-servers',
  () => ['MCP Servers', 'Manage Model Context Protocol servers'],
  async (area) => {
    area.innerHTML = '<div class="empty-state"><div class="icon">⏳</div>Loading...</div>';
    try {
      const servers = await api('/mcp-servers');
      area.innerHTML = '';
      const header = el('div', { class: 'section-header' });
      header.innerHTML = '<h2>MCP Servers</h2>';
      const addBtn = el('button', { class: 'btn btn-primary', onclick() { showMcpForm(area); } }, '+ Add Server');
      header.appendChild(addBtn);
      area.appendChild(header);

      const listCard = el('div', { class: 'card' });
      if (servers.length === 0) {
        listCard.innerHTML = '<div class="empty-state"><div class="icon">🔌</div>No MCP servers registered.</div>';
      } else {
        for (const s of servers) {
          const row = el('div', { class: 'item-row' });
          row.innerHTML = `
            <span class="dot ${s.status === 'online' ? 'dot-green' : 'dot-muted'}"></span>
            <div style="flex:1">
              <div style="font-weight:600">${esc(s.name)}</div>
              <div style="font-size:12px;color:var(--muted)">${esc(s.url || s.endpoint || '—')}</div>
              <div class="tool-list" id="mcp-tools-${esc(s.name)}"></div>
            </div>
            <div class="actions">
              <button class="btn btn-ghost btn-sm" onclick="fetchMcpTools('${esc(s.name)}')">Fetch Tools</button>
              <button class="btn btn-ghost btn-sm" onclick="editMcpServer('${esc(s.name)}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteMcpServer('${esc(s.name)}')">Delete</button>
            </div>
          `;
          listCard.appendChild(row);
        }
      }
      area.appendChild(listCard);
    } catch (e) {
      area.innerHTML = `<div class="empty-state"><div class="icon">⚠</div>${esc(e.message)}</div>`;
    }
  }
);

window.fetchMcpTools = async function(name) {
  try {
    const result = await api(`/mcp-servers/${encodeURIComponent(name)}/fetch-tools`, { method: 'POST' });
    const container = document.getElementById(`mcp-tools-${name}`);
    if (!container) return;
    container.innerHTML = '';
    const tools = result.tools || result || [];
    if (tools.length === 0) {
      container.innerHTML = '<div style="color:var(--muted);font-size:12px;margin-top:6px">No tools found.</div>';
    } else {
      for (const t of tools) {
        container.innerHTML += `<div class="tool-item"><div class="tool-name">${esc(t.name || t)}</div><div class="tool-desc">${esc(t.description || '')}</div></div>`;
      }
    }
    toast('Tools fetched', 'success');
  } catch (e) { toast('Error: ' + e.message, 'error'); }
};

window.editMcpServer = function(name) {
  sessionStorage.setItem('edit-mcp', name);
  navigate('#mcp-servers');
};

window.deleteMcpServer = async function(name) {
  if (!confirm(`Delete MCP server "${name}"?`)) return;
  try {
    await api(`/mcp-servers/${encodeURIComponent(name)}`, { method: 'DELETE' });
    toast('Server deleted', 'success');
    navigate('#mcp-servers');
  } catch (e) { toast('Error: ' + e.message, 'error'); }
};

function showMcpForm(area, existing = null) {
  const formCard = el('div', { class: 'card', style: 'margin-top:16px' });
  formCard.innerHTML = `
    <h3>${existing ? 'Edit Server: ' + esc(existing.name) : 'Add MCP Server'}</h3>
    <div class="form-group"><label>Name *</label><input class="form-control" id="mcp-form-name" value="${esc(existing?.name || '')}" placeholder="my-mcp-server" ${existing ? 'readonly' : ''} /></div>
    <div class="form-group"><label>URL / Endpoint</label><input class="form-control" id="mcp-form-url" value="${esc(existing?.url || existing?.endpoint || '')}" placeholder="http://localhost:8080" /></div>
    <div class="form-group"><label>Description</label><input class="form-control" id="mcp-form-desc" value="${esc(existing?.description || '')}" /></div>
    <div style="display:flex;gap:10px">

      <button class="btn btn-ghost" onclick="navigate('#mcp-servers')">Cancel</button>

    const payload = {

      if (existing) {

        toast('Server updated', 'success');
      } else {
        await api('/mcp-servers', { method: 'POST', body: payload });
        toast('Server added', 'success');
      }
      navigate('#mcp-servers');
    } catch (e) { toast('Error: ' + e.message, 'error'); }
  });

// ── File browser modal ───────────────────────────────────────
function openFileBrowser(onSelect) {
  const overlay = document.createElement('div');
  overlay.id = 'file-browser-overlay';
  overlay.innerHTML = `
    <div id="file-browser-modal">
      <div id="fb-header">
        <h3>Select Agent File</h3>
        <span id="fb-path">/ (project root)</span>
      </div>
      <div id="fb-list"></div>
      <div id="fb-footer">
        <button class="btn btn-ghost" id="fb-cancel">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('fb-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  async function loadDir(path) {
    const list = document.getElementById('fb-list');
    const pathLabel = document.getElementById('fb-path');
    list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px">Loading…</div>';
    const data = await api('/browse?' + new URLSearchParams({ path }));
    pathLabel.textContent = data.current ? data.current : '/ (project root)';
    list.innerHTML = '';

    if (data.parent !== null && data.parent !== undefined) {
      const up = document.createElement('div');
      up.className = 'fb-entry fb-dir';
      up.innerHTML = '<span class="fb-icon">⬆</span> ..';
      up.addEventListener('click', () => loadDir(data.parent));
      list.appendChild(up);
    }

    data.entries.forEach(e => {
      const row = document.createElement('div');
      row.className = 'fb-entry ' + (e.is_dir ? 'fb-dir' : 'fb-file');
      row.innerHTML = `<span class="fb-icon">${e.is_dir ? '📁' : '🐍'}</span>${esc(e.name)}`;
      if (e.is_dir) {
        row.addEventListener('click', () => loadDir(e.path));
      } else if (e.name.endsWith('.py')) {
        row.addEventListener('click', () => { onSelect(e.path); overlay.remove(); });
      } else {
        row.style.opacity = '0.4';
        row.style.cursor = 'default';
      }
      list.appendChild(row);
    });

    if (!list.children.length) {
      list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px">Empty directory</div>';
    }
  }

  loadDir('');
}

function showAgentForm(area, existing = null) {
  // Remove any old form
  const oldForm = area.querySelector('.agent-form-card');
  if (oldForm) oldForm.remove();

  const formCard = el('div', { class: 'card agent-form-card', style: 'margin-top:16px' });
  formCard.innerHTML = `
    <h3>${existing ? 'Edit Agent: ' + esc(existing.name) : 'Add Agent'}</h3>
    <div class="form-group"><label>Name *</label><input class="form-control" id="af-name" value="${esc(existing?.name || '')}" placeholder="my-agent" ${existing ? 'readonly' : ''} /></div>
    <div class="form-group">
      <label>File Path</label>
      <div class="file-path-row">
        <input class="form-control" id="af-path" value="${esc(existing?.file_path || '')}" placeholder="examples/agents/my_agent.py" readonly />
        <button class="btn btn-ghost btn-browse" id="af-browse">📁 Browse</button>
      </div>
    </div>
    <div class="form-group"><label>Description</label><textarea class="form-control" id="af-desc" rows="2">${esc(existing?.description || '')}</textarea></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="af-save">Save</button>
      <button class="btn btn-ghost" onclick="navigate('#agents')">Cancel</button>
    </div>
  `;
  area.appendChild(formCard);

  document.getElementById('af-browse').addEventListener('click', () => openFileBrowser(p => {
    document.getElementById('af-path').value = p;
  }));

  document.getElementById('af-save').addEventListener('click', async () => {
    const name = document.getElementById('af-name').value.trim();
    if (!name) { toast('Name required', 'error'); return; }
    const payload = {
      name,
      file_path: document.getElementById('af-path').value.trim(),
      description: document.getElementById('af-desc').value.trim(),
    };
    try {
      if (existing) {
        await api(`/agents/${encodeURIComponent(existing.name)}`, { method: 'PUT', body: payload });
        toast('Agent updated', 'success');
      } else {
        await api('/agents', { method: 'POST', body: payload });
        toast('Agent added', 'success');
      }
      navigate('#agents');
    } catch (e) { toast('Error: ' + e.message, 'error'); }
  });
}
